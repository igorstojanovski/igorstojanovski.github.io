<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <nav class="site-nav">
      <div class="nav-container">
        <a href="{{ "/" | absolute_url }}" class="site-logo">
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" />
          {% endif %}
          <span>{{ site.title }}</span>
        </a>
        <div class="nav-links">
          <a href="{{ "/" | absolute_url }}">Home</a>
          <a href="https://github.com/{{ site.github.owner_name | default: 'igorstojanovski' }}">GitHub</a>
        </div>
      </div>
    </nav>

    <main class="site-main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name | default: site.title }}. Built with Jekyll.</p>
      </div>
    </footer>
  </body>
</html>
